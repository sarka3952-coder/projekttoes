<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zvířecí Kvíz | Šárka Kašíková</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; background-color: #eef2f3; color: #333; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: #2c3e50; color: white; border-radius: 10px; }
        
        /* Styl pro Síň slávy */
        .leaderboard-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 5px solid #f1c40f; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .leaderboard-table th { color: #2c3e50; text-transform: uppercase; font-size: 0.8em; }

        .question-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #27ae60; }
        .question-card h3 { margin-top: 0; color: #2c3e50; }
        
        /* Styl pro vstup jména */
        .name-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .options { margin-top: 15px; }
        .options label { display: block; margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid #ddd; }
        .options label:hover { background: #d1f2eb; border-color: #1abc9c; }
        .options input { margin-right: 10px; }
        
        .btn { display: block; width: 100%; background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #219150; transform: translateY(-2px); }
        
        #result { margin-top: 30px; padding: 25px; border-radius: 12px; display: none; background: #fff; border: 2px solid #27ae60; text-align: center; animation: fadeIn 0.5s; }
        #ai-comment { font-style: italic; color: #16a085; margin-top: 15px; font-size: 1.2em; border-top: 1px solid #eee; padding-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>🐾 Velký zvířecí kvíz</h1>
        <p>Vítej na stránce sarka-kasikova.kurim.ithope.eu!</p>
    </header>

    <div class="leaderboard-card">
        <h3>🏆 Síň slávy (Top 10)</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Hráč</th>
                    <th>Skóre</th>
                </tr>
            </thead>
            <tbody>
                {% for player in leaderboard %}
                <tr>
                    <td><strong>{{ player.name }}</strong></td>
                    <td>{{ player.score }}/10</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="name-section
